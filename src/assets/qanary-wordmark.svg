    <path d="M48,58 C66,57 78,70 77,90 C63,95 44,87 40,70 Z" fill="#000" opacity="0.12"/>
    <path d="M100,39 L118,44 L100,50 Z" fill="#f2792b"/>
    <circle cx="86" cy="41" r="6.4" fill="#15140f"/>
    <circle cx="86" cy="41" r="3.8" fill="#1fb872"/>
  </g>

