<svg xmlns="http://www.w3.org/2000/svg" width="520" height="200" viewBox="0 0 520 200">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="0%" r="125%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#26241c"/>
      <stop offset="70%" stop-color="#15140f"/>
    </radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&amp;display=swap');
      .wordmark-text { font-family: Inter, system-ui, sans-serif; font-weight: 700; font-size: 46px; letter-spacing: -0.02em; line-height: 1; }
      .tagline-text  { font-family: Inter, system-ui, sans-serif; font-size: 14px; letter-spacing: 0.01em; fill: #8a857a; }
    </style>
  </defs>

  <!-- Icon badge -->
  <rect x="0" y="54" width="92" height="92" rx="22" ry="22" fill="url(#bg-grad)"/>

  <!-- Logo mark -->
  <g transform="translate(14, 61)">
    <path d="M40,66 L6,52 L20,82 Z" fill="#ffcc00"/>
    <path d="M66,30 Q70,12 79,16 Q74,24 80,28 Z" fill="#ffcc00"/>
    <path d="M78,26 Q86,11 94,18 Q86,24 90,30 Z" fill="#ffcc00"/>
    <ellipse cx="54" cy="70" rx="31" ry="28" fill="#ffcc00"/>
