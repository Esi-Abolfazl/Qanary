<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded background -->
  <rect width="1024" height="1024" rx="230" fill="#1a1a17"/>
  <!-- Canary: original viewBox 0 0 120 116, content spans x:6-118 y:11-98
       Scale ~6.4 to fill ~70% of icon, centered -->
