name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v9
        id: create
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Qanary ${tag}`,
              body: 'See the changelog for details.',
              draft: false,
              prerelease: false,
            })
            return data.id

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
            bundle_dir: dmg
            bundle_ext: dmg
            friendly_name: macOS_Apple_Silicon
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
            bundle_dir: dmg
            bundle_ext: dmg
            friendly_name: macOS_Intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
            bundle_dir: nsis
            bundle_ext: exe
            friendly_name: Windows_x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles deb
            bundle_dir: deb
            bundle_ext: deb
            friendly_name: Linux_x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      - name: Rename installer
        if: matrix.friendly_name != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE=$(find src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_dir }} \
            -name "*.${{ matrix.bundle_ext }}" ! -name "*.sig" ! -name "*nsis.zip" ! -iname "uninstall*" | head -1)
          ORIGINAL_NAME=$(basename "$FILE")
          NEWNAME="Qanary_${{ github.ref_name }}_${{ matrix.friendly_name }}.${{ matrix.bundle_ext }}"
          cp "$FILE" "$NEWNAME"
          gh release delete-asset "${{ github.ref_name }}" "$ORIGINAL_NAME" --yes
          gh release upload "${{ github.ref_name }}" "$NEWNAME"
